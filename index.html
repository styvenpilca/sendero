    /* Estilos Generales Responsivos (Lógica Lineal SP) */
    
    /* Estado inicial Desktop: Visible y fijo */
    #panel-contexto-SP {
        transition: transform 0.4s ease, opacity 0.4s ease;
    }

    /* Botón de toggle (Tab) - Oculto por defecto en Desktop */
    #toggle-tab-SP {
        display: none;
    }

    /* Reglas para Celulares */
    @media (max-width: 768px) {
        /* Reubicación y stilos responsivos del panel */
        #panel-contexto-SP {
            left: 50% !important;
            transform: translateX(-50%) translateY(0) !important; /* Centrado y visible */
            width: 90% !important;
            top: 10px !important;
            padding: 15px 15px 10px 15px !important;
            border-radius: 12px !important;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.4) !important;
        }

        /* CLASE ESTADO CERRADO (Persiana arriba) - Se aplica con JS */
        #panel-contexto-SP.panel-cerrado-SP {
            /* Lo subimos tanto que solo queda visible el botón toggle */
            transform: translateX(-50%) translateY(-265px) !important; 
            /* Descomenta la siguiente línea si quieres que sea ligeramente transparente al estar cerrado */
            /* opacity: 0.8; */
        }
        
        #panel-contexto-SP h2 { font-size: 1.1rem !important; }
        #panel-contexto-SP p { font-size: 13px !important; }
        /* Carrusel más compacto en móvil */
        #carrusel-SP img { height: 110px !important; }

        /* Ajuste de controles de Leaflet para móvil */
        .leaflet-top.leaflet-left { top: 70px !important; } /* Un poco más abajo cuando está abierto */
        
        /* Efecto en controles cuando el panel se cierra */
        #panel-contexto-SP.panel-cerrado-SP ~ #map .leaflet-top.leaflet-left {
            top: 20px !important; /* Vuelven a subir si el panel no molesta */
        }

        /* Mostrar y estilar el Botón de toggle en móvil */
        #toggle-tab-SP {
            display: flex;
            position: absolute;
            bottom: -35px; /* Pende por debajo del panel */
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 35px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 0 0 12px 12px; /* Redondeado solo abajo */
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1001; /* Sobre el panel */
            color: #2c7a3f;
            font-size: 1.3rem;
            transition: color 0.2s ease;
        }
        #toggle-tab-SP:hover { color: #1e3f28; }
    }
</style>

        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    var img = popup._contentNode.querySelector('td img');
                    if (img) {
                        // If already loaded (cache), update immediately
                        if (img.complete && img.naturalHeight > 0) {
                            popup.update();
                        } else {
                            img.addEventListener('load', function() {
                                popup.update();
                            });
                            img.addEventListener('error', function() {
                                popup.update();
                            });
                        }
                    }
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }

// Lógica Lineal SP: Acordeón Responsivo del Panel de Contexto
(function() {
    // 1. Targetear los elementos necesarios
    var panel_SP = document.getElementById('panel-contexto-SP');
    var tab_SP = document.getElementById('toggle-tab-SP');

    // 2. Definir la función de toggle (procedural)
    function togglePanel_SP() {
        // Intercambiar la clase 'panel-cerrado-SP'. CSS hará la transición.
        panel_SP.classList.toggle('panel-cerrado-SP');
        
        // Rotar la flecha para indicar dirección de apertura/cierre
        if (panel_SP.classList.contains('panel-cerrado-SP')) {
            tab_SP.innerHTML = '▼'; // Panel cerrado -> flecha hacia abajo (indica abrir)
        } else {
            tab_SP.innerHTML = '▲'; // Panel abierto -> flecha hacia arriba (indica cerrar)
        }
    }

    // 3. Escuchar el evento de clic en el tab
    tab_SP.addEventListener('click', togglePanel_SP);
})();
